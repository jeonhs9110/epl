<!-- ─── UPDATE MODE MODAL ──────────────────────────────────────────── -->
<div class="modal fade" id="updateModeModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-arrow-repeat"></i> Update Mode
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                        aria-label="Close" id="updateModalClose"></button>
            </div>
            <div class="modal-body">

                <!-- PRE-START: config panel -->
                <div id="updateConfigPanel">
                    <p class="text-muted small mb-3">
                        Runs the full refresh pipeline in one shot:
                        historical odds → league results → upcoming fixtures →
                        validation → DL training → hybrid XGBoost → RL agent.
                    </p>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="updateTestMode">
                        <label class="form-check-label" for="updateTestMode">
                            <strong>Test Mode</strong>
                            <span class="text-muted small d-block">
                                Skip scraping, 1-epoch training, ~2 min total. Use this to verify
                                the pipeline end-to-end before running a full update.
                            </span>
                        </label>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="updateScrapeOnly">
                        <label class="form-check-label" for="updateScrapeOnly">
                            <strong>Scrape Only</strong>
                            <span class="text-muted small d-block">
                                Refresh match data without retraining (steps 1–4 only).
                                Runs automatically every day at 11:00 KST on the cloud deployment.
                            </span>
                        </label>
                    </div>
                    <button class="btn btn-primary w-100" id="updateStartBtn" onclick="startUpdate()">
                        <i class="bi bi-play-fill"></i> Start Update
                    </button>
                </div>

                <!-- IN-PROGRESS: progress ring + log -->
                <div id="updateProgressPanel" style="display:none;">
                    <div class="d-flex flex-column align-items-center mb-3">
                        <!-- SVG progress ring -->
                        <svg width="180" height="180" viewBox="0 0 180 180" id="updateRing">
                            <circle cx="90" cy="90" r="75" stroke="#e9ecef"
                                    stroke-width="12" fill="none"/>
                            <circle cx="90" cy="90" r="75" stroke="#0d6efd"
                                    stroke-width="12" fill="none"
                                    stroke-linecap="round"
                                    stroke-dasharray="471.24"
                                    stroke-dashoffset="471.24"
                                    transform="rotate(-90 90 90)"
                                    id="updateRingFill"
                                    style="transition: stroke-dashoffset 0.4s ease;"/>
                            <text x="90" y="95" text-anchor="middle"
                                  font-size="28" font-weight="bold"
                                  fill="#0d6efd" id="updateRingLabel">0%</text>
                        </svg>
                        <div class="mt-2 text-center">
                            <div class="fw-bold" id="updateStepName">Starting...</div>
                            <div class="text-muted small" id="updateSubMessage"></div>
                            <div class="text-muted small mt-1" id="updateStepCounter">Step 0 / 7</div>
                        </div>
                    </div>

                    <div class="bg-dark text-white rounded p-2 font-monospace small"
                         style="max-height: 220px; overflow-y: auto;" id="updateLog">
                        <span class="text-secondary">$ waiting for pipeline output...</span>
                    </div>
                </div>

                <!-- FINISHED: result summary -->
                <div id="updateResultPanel" style="display:none;" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let updatePollTimer = null;

    function openUpdateModal() {
        // Reset panels
        document.getElementById('updateConfigPanel').style.display = 'block';
        document.getElementById('updateProgressPanel').style.display = 'none';
        document.getElementById('updateResultPanel').style.display = 'none';
        document.getElementById('updateResultPanel').innerHTML = '';
        document.getElementById('updateStartBtn').disabled = false;

        // If a pipeline is already running (e.g. started from another tab), jump straight to progress view
        fetch('/update_mode/status')
            .then(r => r.json())
            .then(s => {
                if (s.running || s.status === 'running') {
                    showUpdateProgress();
                    beginUpdatePolling();
                }
            })
            .catch(() => {});

        new bootstrap.Modal(document.getElementById('updateModeModal')).show();
    }

    function showUpdateProgress() {
        document.getElementById('updateConfigPanel').style.display = 'none';
        document.getElementById('updateProgressPanel').style.display = 'block';
        document.getElementById('updateResultPanel').style.display = 'none';
        // Block closing while running
        document.getElementById('updateModalClose').disabled = true;
    }

    async function startUpdate() {
        const testMode = document.getElementById('updateTestMode').checked;
        const scrapeOnly = document.getElementById('updateScrapeOnly').checked;
        document.getElementById('updateStartBtn').disabled = true;

        try {
            const res = await fetch('/update_mode/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ test_mode: testMode, scrape_only: scrapeOnly })
            });
            const result = await res.json();
            if (res.status === 409) {
                // Already running — just show progress
                showUpdateProgress();
                beginUpdatePolling();
                return;
            }
            if (result.status !== 'success') {
                alert('Error starting update: ' + (result.message || 'unknown'));
                document.getElementById('updateStartBtn').disabled = false;
                return;
            }
            showUpdateProgress();
            beginUpdatePolling();
        } catch (e) {
            alert('Request failed: ' + e);
            document.getElementById('updateStartBtn').disabled = false;
        }
    }

    function beginUpdatePolling() {
        if (updatePollTimer) clearInterval(updatePollTimer);
        pollUpdateStatus();
        updatePollTimer = setInterval(pollUpdateStatus, 1500);
    }

    async function pollUpdateStatus() {
        try {
            const res = await fetch('/update_mode/status');
            const s = await res.json();

            // Progress ring
            const pct = Math.max(0, Math.min(100, s.overall_pct || 0));
            const circumference = 471.24; // 2πr, r=75
            const offset = circumference * (1 - pct / 100);
            document.getElementById('updateRingFill').style.strokeDashoffset = offset;
            document.getElementById('updateRingLabel').textContent = Math.round(pct) + '%';

            // Text
            document.getElementById('updateStepName').textContent = s.step_name || '—';
            document.getElementById('updateSubMessage').textContent = s.sub_message || '';
            document.getElementById('updateStepCounter').textContent =
                `Step ${s.step || 0} / ${s.total_steps || 7}`;

            // Log
            const logDiv = document.getElementById('updateLog');
            if (s.log && s.log.length) {
                logDiv.innerHTML = s.log.map(l => {
                    let cls = 'text-white';
                    if (l.includes('ERROR') || l.includes('FATAL')) cls = 'text-danger';
                    else if (l.includes('WARN')) cls = 'text-warning';
                    else if (l.includes('FINISHED')) cls = 'text-success fw-bold';
                    return `<div class="${cls}">&gt; ${l.replace(/</g,'&lt;')}</div>`;
                }).join('');
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // Terminal states
            if (s.status === 'complete' || s.status === 'error') {
                clearInterval(updatePollTimer);
                updatePollTimer = null;
                document.getElementById('updateModalClose').disabled = false;
                renderUpdateResult(s);
            }
        } catch (e) {
            console.error('Poll error:', e);
        }
    }

    function renderUpdateResult(s) {
        const panel = document.getElementById('updateResultPanel');
        panel.style.display = 'block';

        const ok = s.status === 'complete';
        const stepRows = (s.result && s.result.steps ? s.result.steps : [])
            .map(r => {
                let badge = 'secondary';
                if (r.status === 'ok') badge = 'success';
                else if (r.status === 'error') badge = 'danger';
                else if (r.status === 'warning') badge = 'warning';
                else if (r.status === 'skipped') badge = 'secondary';
                return `<tr>
                    <td>${r.step}</td>
                    <td>${r.name}</td>
                    <td><span class="badge bg-${badge}">${r.status}</span></td>
                </tr>`;
            }).join('');

        panel.innerHTML = `
        <div class="alert alert-${ok ? 'success' : 'danger'} mt-3">
            <strong>${ok ? 'Update complete.' : 'Update failed.'}</strong>
            ${s.result && s.result.message ? s.result.message : ''}
            <div class="small mt-1">
                Models and data on disk have been refreshed. Restart the Flask server
                to load the new weights into the prediction endpoint.
            </div>
        </div>
        <table class="table table-sm table-bordered text-center align-middle">
            <thead class="table-light"><tr><th>#</th><th>Step</th><th>Result</th></tr></thead>
            <tbody>${stepRows}</tbody>
        </table>`;
    }
</script>
