<!-- ─── AI CHATBOT WIDGET (bottom-right) ─────────────────────── -->
<style>
    #fobo-chat-fab {
        position: fixed; bottom: 20px; right: 20px; z-index: 1000;
        width: 56px; height: 56px; border-radius: 50%;
        background: var(--green); color: #000; border: none;
        box-shadow: 0 8px 24px rgba(0,0,0,0.25); cursor: pointer;
        font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    #fobo-chat-fab:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.3); }
    #fobo-chat-panel {
        position: fixed; bottom: 88px; right: 20px; z-index: 1000;
        width: 360px; max-width: 95vw; max-height: 75vh;
        background: #fff; border: 1px solid var(--border); border-radius: 14px;
        display: none; flex-direction: column;
        box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow: hidden;
    }
    #fobo-chat-panel.open { display: flex; }
    #fobo-chat-header {
        padding: 12px 14px; background: var(--green); color: #000;
        font-weight: 700; display: flex; align-items: center; justify-content: space-between;
    }
    #fobo-chat-body {
        flex: 1; overflow-y: auto; padding: 12px;
        background: #f8fafc; font-size: 0.88rem; line-height: 1.45;
    }
    .fobo-bubble {
        padding: 8px 12px; border-radius: 12px; margin-bottom: 8px;
        max-width: 88%; white-space: pre-wrap; word-wrap: break-word;
    }
    .fobo-bubble.user { background: var(--green-dim); color: var(--text); margin-left: auto; border-bottom-right-radius: 4px; }
    .fobo-bubble.bot  { background: #fff; border: 1px solid var(--border); color: var(--text); margin-right: auto; border-bottom-left-radius: 4px; }
    .fobo-bubble.err  { background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.3); color: #b71c1c; }
    #fobo-chat-input-row {
        padding: 10px; border-top: 1px solid var(--border); background: #fff;
        display: flex; gap: 8px;
    }
    #fobo-chat-input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 0.88rem; outline: none; }
    #fobo-chat-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,176,80,0.15); }
    #fobo-chat-send { border: none; background: var(--green); color: #000; border-radius: 8px; padding: 0 14px; font-weight: 700; cursor: pointer; }
    #fobo-chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .fobo-chip { display: inline-block; background: rgba(0,0,0,0.04); border: 1px solid var(--border); padding: 4px 10px; border-radius: 999px; font-size: 0.76rem; cursor: pointer; margin: 2px 4px 2px 0; }
    .fobo-chip:hover { background: var(--green-dim); color: var(--green); border-color: var(--green); }
</style>

<button id="fobo-chat-fab" onclick="foboChatToggle()" title="AI betting assistant">
    <i class="bi bi-chat-dots-fill"></i>
</button>

<div id="fobo-chat-panel" aria-hidden="true">
    <div id="fobo-chat-header">
        <span><i class="bi bi-stars"></i> FOBO AI Assistant</span>
        <button onclick="foboChatToggle()" style="background:none;border:none;color:#000;font-size:1.2rem;cursor:pointer;line-height:1;">&times;</button>
    </div>
    <div id="fobo-chat-body">
        <div class="fobo-bubble bot">
            <b>Hi! I analyse today's matches.</b><br>
            Load the <b>Daily Schedule</b> tab first, then ask me things like:
            <div class="mt-2">
                <span class="fobo-chip" onclick="foboChatPresetEn()">Give me 3 top picks</span>
                <span class="fobo-chip" onclick="foboChatPresetKo()">오늘 가장 확률 높은 3경기</span>
                <span class="fobo-chip" onclick="foboChatPresetBtts()">Any BTTS value today?</span>
            </div>
        </div>
    </div>
    <div id="fobo-chat-input-row">
        <input id="fobo-chat-input" type="text"
               placeholder="Ask about today's matches..."
               onkeydown="if(event.key==='Enter') foboChatSend()">
        <button id="fobo-chat-send" onclick="foboChatSend()">Send</button>
    </div>
</div>

<script>
    function foboChatToggle() {
        const p = document.getElementById('fobo-chat-panel');
        p.classList.toggle('open');
    }
    function foboChatPresetEn() { document.getElementById('fobo-chat-input').value = 'Give me 3 picks most likely to hit today with reasoning'; foboChatSend(); }
    function foboChatPresetKo() { document.getElementById('fobo-chat-input').value = '오늘 경기 중 적중 확률이 가장 높은 3경기를 이유와 함께 추천해줘'; foboChatSend(); }
    function foboChatPresetBtts() { document.getElementById('fobo-chat-input').value = 'Are there any BTTS bets with positive expected value today?'; foboChatSend(); }

    function foboChatAppend(role, text) {
        const body = document.getElementById('fobo-chat-body');
        const div = document.createElement('div');
        div.className = 'fobo-bubble ' + role;
        div.textContent = text;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
        return div;
    }

    async function foboChatSend() {
        const input = document.getElementById('fobo-chat-input');
        const q = (input.value || '').trim();
        if (!q) return;

        const matches = window.__dailyMatches || [];
        foboChatAppend('user', q);
        input.value = '';

        if (!matches.length) {
            foboChatAppend('err', 'Open the Daily Schedule tab first so I have matches to analyse.');
            return;
        }

        const btn = document.getElementById('fobo-chat-send');
        btn.disabled = true;
        const thinking = foboChatAppend('bot', '…');

        try {
            const res = await fetch('/api/chat/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, matches: matches })
            });
            const data = await res.json();
            if (data.status === 'success') {
                thinking.textContent = data.answer;
            } else {
                thinking.className = 'fobo-bubble err';
                thinking.textContent = 'Error: ' + (data.message || 'unknown');
            }
        } catch (e) {
            thinking.className = 'fobo-bubble err';
            thinking.textContent = 'Network error: ' + e;
        } finally {
            btn.disabled = false;
        }
    }

    // Per-match report (called by the AI Report button inside each daily-schedule card)
    async function generateMatchReport(btn, matchPayload) {
        const match = JSON.parse(decodeURIComponent(matchPayload));
        const slot = btn.parentElement.querySelector('.ai-report-slot');
        slot.style.display = 'block';
        slot.innerHTML = '<div class="alert alert-info mt-2 mb-0 small"><div class="spinner-border spinner-border-sm me-2"></div> Generating AI report...</div>';
        btn.disabled = true;
        try {
            const res = await fetch('/api/chat/match_report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(match)
            });
            const data = await res.json();
            if (data.status === 'success') {
                slot.innerHTML = `
                <div class="alert alert-secondary mt-2 mb-0 text-start" style="white-space: pre-wrap; font-size: 0.85rem;">
                    <div class="small text-muted mb-1"><i class="bi bi-stars text-success"></i> AI Report · ${match.home} vs ${match.away}</div>
                    ${data.report.replace(/</g,'&lt;')}
                </div>`;
            } else {
                slot.innerHTML = `<div class="alert alert-danger mt-2 mb-0 small">${data.message || 'Report failed'}</div>`;
            }
        } catch (e) {
            slot.innerHTML = `<div class="alert alert-danger mt-2 mb-0 small">Request failed: ${e}</div>`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
