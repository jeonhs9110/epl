<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script id="fobo-league-teams" type="application/json">{{ league_teams | tojson | safe }}</script>
<script id="fobo-leagues" type="application/json">{{ leagues | tojson | safe }}</script>
<script>
    const foboLeagueTeams = JSON.parse(document.getElementById('fobo-league-teams').textContent);
    const foboLeagues = JSON.parse(document.getElementById('fobo-leagues').textContent);
    let myChart = null;
    let currentStrategyMatches = [];
    let globalBetHistory = [];

    window.onload = function () {
        const today = new Date();

        document.getElementById('predDate').valueAsDate = today;
        document.getElementById('calDate').valueAsDate = today;

        const pLeague = document.getElementById('predLeague');
        const pwLeague = document.getElementById('powerLeague');

        foboLeagues.forEach(l => {
            // Filter out old seasons (consistent with backend filtering)
            if (l.includes('2022 2023') || l.includes('2023 2024') || l.includes('2024 2025')) return;

            pLeague.add(new Option(l, l));
            pwLeague.add(new Option(l, l));
        });
        updateTeams('pred');

        // --- LOAD OPTIMAL THRESHOLDS ---
        fetch('/get_optimal_thresholds')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('sliderPred').value = data.pred;
                    document.getElementById('sliderRL').value = data.rl;

                    // Update Labels immediately
                    document.getElementById('lblPred').innerText = data.pred + '%';
                    document.getElementById('lblRL').innerText = data.rl + '%';
                }
            })
            .catch(err => console.error("Error loading thresholds:", err));
    };

    function updateTeams(type) {
        const leagueSelect = document.getElementById(type + 'League');
        const teams = foboLeagueTeams[leagueSelect.value];
        if (!teams) return;
        if (type === 'pred') {
            const h = document.getElementById('predHome'), a = document.getElementById('predAway');
            h.innerHTML = ''; a.innerHTML = '';
            teams.forEach(t => { h.add(new Option(t, t)); a.add(new Option(t, t)); });
        }
    }

    async function getDailyMatches() {
        const startInput = document.getElementById('calDate');

        if (!startInput.value) startInput.valueAsDate = new Date();

        document.getElementById('calLoading').style.display = 'block';
        document.getElementById('dailyScheduleContainer').innerHTML = '';

        try {
            const res = await fetch('/get_daily_matches', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    start_date: startInput.value,
                    end_date: startInput.value // Same date for single day view
                })
            });
            const result = await res.json();
            document.getElementById('calLoading').style.display = 'none';

            if (result.status === 'success') {
                const container = document.getElementById('dailyScheduleContainer');
                container.innerHTML = ''; // Clear previous content

                // Stash for the AI chatbot so it can answer "top picks today"
                window.__dailyMatches = result.matches || [];

                if (result.matches.length === 0) {
                    container.innerHTML = '<div class="alert alert-secondary text-center">No matches scheduled for this date (or scrape required).</div>';
                    document.getElementById('dailyExportBtns').style.display = 'none';
                    return;
                }

                document.getElementById('dailyExportBtns').style.display = 'flex';

                // Sort matches: Certain (HOME, DRAW, AWAY) first, then PASS
                result.matches.sort((a, b) => {
                    const isCertA = a.rl_label && !a.rl_label.includes('PASS') && a.rl_label !== 'N/A';
                    const isCertB = b.rl_label && !b.rl_label.includes('PASS') && b.rl_label !== 'N/A';
                    if (isCertA && !isCertB) return -1;
                    if (!isCertA && isCertB) return 1;
                    return 0;
                });

                result.matches.forEach(m => {
                    // Helper for styled values
                    const styleVal = (val, isPct = true) => {
                        if (val === undefined || val === null) return '-';
                        return isPct ? `<strong>${val}%</strong>` : `<strong>${val}</strong>`;
                    };

                    // Helper to generate History Table Rows
                    const genHistoryRows = (historyList) => {
                        if (!historyList || historyList.length === 0) return '<tr><td colspan="4" class="text-muted small">No recent info</td></tr>';
                        return historyList.map(h => {
                            let badge = 'secondary';
                            if (h.result === 'W') badge = 'success';
                            if (h.result === 'L') badge = 'danger';
                            if (h.result === 'D') badge = 'warning text-dark';
                            return `
                            <tr class="small">
                                <td>${h.date}</td>
                                <td>${h.matchup}</td>
                                <td>${h.score}</td>
                                <td><span class="badge bg-${badge}">${h.result}</span></td>
                            </tr>`;
                        }).join('');
                    };

                    const oddsSrc = m.odds_source || 'implied_elo';
                    const oddsUsed = m.odds_used || [0, 0, 0];
                    const oddsSrcBadge = oddsSrc === 'real'
                        ? `<span class="badge" style="background:rgba(0,176,80,0.12);color:#00b050;font-size:0.65rem;">✅ Real Odds ${oddsUsed[0]}/${oddsUsed[1]}/${oddsUsed[2]}</span>`
                        : `<span class="badge" style="background:rgba(255,152,0,0.12);color:#f57f17;font-size:0.65rem;">⚙️ ELO Implied ${oddsUsed[0]}/${oddsUsed[1]}/${oddsUsed[2]}</span>`;

                    const matchPayload = encodeURIComponent(JSON.stringify(m));
                    const cardHtml = `
                    <div class="card border mb-3 shadow-sm bg-white" style="page-break-inside: avoid;">
                        <div class="card-header text-center bg-white border-bottom-0 pb-0 pt-4 position-relative">
                            <button class="btn btn-sm btn-outline-primary position-absolute" style="top:12px; right:12px;"
                                    onclick="generateMatchReport(this, '${matchPayload}')">
                                <i class="bi bi-stars"></i> AI Report
                            </button>
                            <h3 class="fw-bold text-dark">${m.home} vs ${m.away}</h3>
                            <p class="text-muted small">${m.league} • ${m.date || 'Today'} ${m.time && m.time !== '00:00' ? m.time : ''} &nbsp; ${oddsSrcBadge}</p>
                            <div class="ai-report-slot" style="display:none;"></div>
                        </div>
                        <div class="card-body">
                            <div class="alert alert-${m.rl_color || 'secondary'} border-${m.rl_color || 'secondary'} mb-3 text-center shadow-sm bg-opacity-10">
                                <div class="d-flex justify-content-center align-items-center mb-2">
                                    <span class="fs-5 me-2">🤖</span>
                                    <strong>RL Reinforced Training:</strong>
                                </div>
                                <h2 class="fw-bold mb-1">${m.rl_label || 'N/A'} <span class="fs-3">${m.rl_icon || ''}</span></h2>
                                <p class="mb-0 small text-muted font-monospace">Confidence: ${m.rl_conf || '0'}% (${m.rl_desc || 'No Info'})</p>
                                ${m.rl_label && m.rl_label.includes('PASS') && m.rec_label !== '-' ? `
                                <div class="mt-2 pt-2 border-top border-secondary border-opacity-25">
                                    <span class="badge bg-secondary">Model Lean: ${m.rec_label}</span>
                                </div>
                                ` : ''}
                            </div>
                            <table class="table table-bordered text-center mb-0 align-middle">
                                <thead>
                                    <tr class="align-middle">
                                        <th style="width: 20%;">Market</th>
                                        <th class="text-secondary" style="width: 20%;">
                                            Final
                                            ${m.is_hybrid ? '<br><span class="badge bg-dark small" style="font-size:0.6rem;">XY Boost</span>' : ''}
                                        </th>
                                        <th class="text-primary" style="width: 20%;">Best Loss</th>
                                        <th class="text-info" style="width: 20%;">Best Acc</th>
                                        <th class="bg-success text-white" style="width: 20%;">Avg</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>📊 Proj. xG</td>
                                        <td>-</td>
                                        <td>-</td>
                                        <td>-</td>
                                        <td class="fw-bold">${m.avg_home_xg} - ${m.avg_away_xg}</td>
                                    </tr>
                                    <tr>
                                        <td>🎯 Score</td>
                                        <td>-</td>
                                        <td>-</td>
                                        <td>-</td>
                                        <td class="fw-bold fs-5">${m.pred_score}</td>
                                    </tr>
                                    <tr>
                                        <td>🏠 Home Win</td>
                                        <td class="${m.is_hybrid ? 'fw-bold text-dark' : ''}">
                                            ${styleVal(m.final_win)}
                                        </td>
                                        <td>${styleVal(m.loss_win)}</td>
                                        <td>${styleVal(m.acc_win)}</td>
                                        <td>${styleVal(m.avg_win)}</td>
                                    </tr>
                                    <tr>
                                        <td>🤝 Draw</td>
                                        <td class="${m.is_hybrid ? 'fw-bold text-dark' : ''}">
                                            ${styleVal(m.final_draw)}
                                        </td>
                                        <td>${styleVal(m.loss_draw)}</td>
                                        <td>${styleVal(m.acc_draw)}</td>
                                        <td>${styleVal(m.avg_draw)}</td>
                                    </tr>
                                    <tr>
                                        <td>✈️ Away Win</td>
                                        <td class="${m.is_hybrid ? 'fw-bold text-dark' : ''}">
                                            ${styleVal(m.final_loss)}
                                        </td>
                                        <td>${styleVal(m.loss_loss)}</td>
                                        <td>${styleVal(m.acc_loss)}</td>
                                        <td>${styleVal(m.avg_loss)}</td>
                                    </tr>
                                    <tr class="table-light"><td colspan="5" class="p-1"></td></tr>
                                    <tr>
                                        <td>Over 2.5</td>
                                        <td>${styleVal(m.final_o25)}</td>
                                        <td>${styleVal(m.loss_o25)}</td>
                                        <td>${styleVal(m.acc_o25)}</td>
                                        <td>${styleVal(m.avg_o25)}</td>
                                    </tr>
                                    <tr class="btts-row">
                                        <td>BTTS</td>
                                        <td>${styleVal(m.final_btts)}</td>
                                        <td>${styleVal(m.loss_btts)}</td>
                                        <td>${styleVal(m.acc_btts)}</td>
                                        <td class="text-danger">${styleVal(m.avg_btts)}</td>
                                    </tr>
                                </tbody>
                            </table>

                            <!-- Detailed Form Section -->
                            <div class="row mt-4 g-3">
                                <div class="col-md-6">
                                    <div class="p-2 border rounded bg-light">
                                        <div class="text-center fw-bold text-primary mb-2">${m.home} Recent Form</div>
                                        <table class="table table-sm table-borderless mb-0">
                                            <tbody>${genHistoryRows(m.home_form)}</tbody>
                                        </table>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-2 border rounded bg-light">
                                        <div class="text-center fw-bold text-danger mb-2">${m.away} Recent Form</div>
                                        <table class="table table-sm table-borderless mb-0">
                                            <tbody>${genHistoryRows(m.away_form)}</tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center mt-3 text-muted"><small>FOBO AI • ${new Date().toLocaleDateString()}</small></div>
                        </div>
                    </div>`;

                    container.innerHTML += cardHtml;
                });
            } else {
                alert('Error: ' + result.message);
            }
        } catch (e) {
            console.error(e);
            alert('Connection Error');
            document.getElementById('calLoading').style.display = 'none';
        }
    }

    function adjustThreshold(sliderId, delta) {
        const slider = document.getElementById(sliderId);
        let val = parseInt(slider.value);
        val += delta;
        if (val < parseInt(slider.min)) val = parseInt(slider.min);
        if (val > parseInt(slider.max)) val = parseInt(slider.max);
        slider.value = val;
        updateFilters();
    }

    function updateFilters() {
        const predVal = parseFloat(document.getElementById('sliderPred').value);
        const rlVal = parseFloat(document.getElementById('sliderRL').value);

        // Update labels
        document.getElementById('lblPred').innerText = predVal + '%';
        document.getElementById('lblRL').innerText = rlVal + '%';

        renderMatches(predVal, rlVal);
    }

    function renderMatches(predThresh, rlThresh) {
        const bankers = [];
        const predPicks = [];
        const rlPicks = [];

        currentStrategyMatches.forEach(m => {
            const isPred = m.pred_conf >= predThresh;
            const isRL = m.rl_pick !== 'PASS' && m.rl_conf >= rlThresh;

            // 1. Bankers (Intersection + Agreement)
            if (isPred && isRL && m.pred_pick === m.rl_pick) {
                bankers.push(m);
            }

            // 2. Best Prediction
            if (isPred) {
                predPicks.push(m);
            }

            // 3. RL Picks
            if (isRL) {
                rlPicks.push(m);
            }
        });

        const fillList = (items, listId, type) => {
            const list = document.getElementById(listId);
            list.innerHTML = '';
            if (items.length === 0) {
                list.innerHTML = '<li class="list-group-item text-muted text-center">No matches meet this criteria. Try lowering the threshold.</li>';
                return;
            }

            items.forEach(i => {
                let pickObj = type === 'rl' ? i.rl_pick : i.pred_pick;
                let confObj = type === 'rl' ? i.rl_conf : i.pred_conf;

                let extra = '';
                if (type === 'pred' && i.rl_pick !== 'PASS') extra = ` <span class="badge bg-secondary opacity-50 ms-1">RL: ${i.rl_pick}</span>`;
                if (type === 'rl') extra = ` <span class="badge bg-secondary opacity-50 ms-1">Model: ${i.pred_pick} (${i.pred_conf}%)</span>`;
                if (type === 'banker') extra = ` <span class="badge bg-success ms-1">AGREEMENT</span>`;

                const globalIdx = currentStrategyMatches.indexOf(i);

                const inHistory = globalBetHistory.some(b => b.home === i.home && b.away === i.away && b.match_date === i.date);

                let checkboxHtml = '';
                if (inHistory) {
                    checkboxHtml = `<span class="badge bg-success" style="width: 1.5em; height: 1.5em; display:flex; align-items:center; justify-content:center;" title="Already in Bet History"><i class="bi bi-check-lg"></i></span>`;
                } else {
                    checkboxHtml = `<input class="form-check-input mb-0 strategy-cb" type="checkbox" data-idx="${globalIdx}" style="width: 1.5em; height: 1.5em; cursor: pointer;">`;
                }

                list.innerHTML += `
                 <li class="list-group-item hover-elevate p-0">
                    <div class="d-flex justify-content-between align-items-center p-3">
                        <div class="d-flex align-items-center gap-3">
                            ${checkboxHtml}
                            <div onclick="toggleStrategyPrediction(${globalIdx})" style="cursor: pointer;">
                                <strong>${i.match}</strong>
                                <div class="small text-muted">${i.date} ${i.time && i.time !== '00:00' ? i.time : ''} • ${i.league}</div>
                            </div>
                        </div>
                        <div onclick="toggleStrategyPrediction(${globalIdx})" style="cursor: pointer;" class="d-flex flex-column align-items-end gap-1">
                            <span class="badge rounded-pill bg-primary fs-6">${pickObj} (${confObj}%)${extra}</span>
                            ${i.odds_source === 'implied_elo'
                        ? `<span style="font-size:0.65rem;color:#f57f17;">⚙️ ELO implied</span>`
                        : `<span style="font-size:0.65rem;color:#00b050;">✅ Real odds</span>`}
                        </div>
                    </div>
                    <div id="strat-detail-${globalIdx}" style="display:none;" class="bg-light border-top p-3">
                        <!-- Detail content will be loaded here -->
                    </div>
                 </li>`;
            });
        };

        fillList(bankers, 'listBankers', 'banker');
        fillList(predPicks, 'listAcca', 'pred');
        fillList(rlPicks, 'listRL', 'rl');
    }

    function loadPredictionFromStrategy(index) {
        const m = currentStrategyMatches[index];
        if (!m) return;

        // 1. Switch to Prediction Tab
        const triggerEl = document.querySelector('button[data-bs-target="#predict"]');
        const tab = bootstrap.Tab.getOrCreateInstance(triggerEl);
        tab.show();

        // 2. Set Values
        const lSelect = document.getElementById('predLeague');
        lSelect.value = m.league;

        updateTeams('pred');

        document.getElementById('predHome').value = m.home;
        document.getElementById('predAway').value = m.away;
        document.getElementById('predDate').value = m.date;

        // 3. Run Prediction
        getPrediction();

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- UNIFIED PREDICTION RENDERING ---
    function renderUnifiedPrediction(result, h, a, showExport) {
        const m_final = result.model_final;
        const m_loss = result.model_loss;
        const m_acc = result.model_acc;
        const getVal = (obj, key) => obj ? obj[key] + '%' : '-';
        const getScore = (obj) => obj ? obj.predicted_score : '-';

        // ODDS SOURCE BADGE
        const src = result.odds_source || 'implied_elo';
        const usedOdds = result.odds_used || [0, 0, 0];
        const oddsBadge = src === 'real'
            ? `<span class="badge rounded-pill" style="background:rgba(0,176,80,0.15);color:#00b050;border:1px solid rgba(0,176,80,0.3);font-size:0.72rem;">✅ Real Odds &nbsp;<span class="fw-normal opacity-75">${usedOdds[0]} / ${usedOdds[1]} / ${usedOdds[2]}</span></span>`
            : `<span class="badge rounded-pill" style="background:rgba(255,152,0,0.12);color:#f57f17;border:1px solid rgba(255,152,0,0.3);font-size:0.72rem;">⚙️ ELO Implied Odds &nbsp;<span class="fw-normal opacity-75">${usedOdds[0]} / ${usedOdds[1]} / ${usedOdds[2]}</span></span>`;

        // RL BADGE
        let rlHtml = '';
        if (result.rl_agent && result.rl_agent.recommendation !== 'N/A') {
            let rl = result.rl_agent;
            rlHtml = `
            <div class="alert alert-warning text-center fw-bold shadow-sm" style="border: 2px solid #ffc107;">
                🤖 RL Agent Advice: <span class="text-dark display-6 d-block my-1">${rl.recommendation}</span>
                <small class="text-muted">Confidence: ${rl.confidence}% (Optimized for High Probability)</small>
            </div>`;
        }

        // Form Rows Helper
        const genFormRows = (list) => {
            if (!list || list.length === 0) return '<tr><td colspan="4">No recent info</td></tr>';
            return list.map(m => `<tr><td>${m.date}</td><td><small>${m.matchup}</small></td><td><strong>${m.score}</strong></td><td><span class="form-badge-${m.result}">${m.result}</span></td></tr>`).join('');
        };

        const exportBtns = showExport ? `
        <div class="d-flex justify-content-center gap-2 mb-4">
            <button class="btn btn-outline-secondary" onclick="copyHTML()">📋 Copy HTML Code</button>
            <button class="btn btn-outline-success" onclick="downloadImage()">📸 Download Image</button>
        </div>` : '';

        // Generate Add to History section
        let historyBtnHtml = '';
        if (!showExport) {
            const matchDataStr = encodeURIComponent(JSON.stringify({
                home: h,
                away: a,
                date: result.match_date || new Date().toISOString().split('T')[0],
                pred_score: getScore(result.average) || '-',
                pred_win: result.average?.win || 0,
                pred_draw: result.average?.draw || 0,
                pred_loss: result.average?.loss || 0,
                rl_pick: result.rl_agent ? result.rl_agent.recommendation : 'N/A'
            }));

            historyBtnHtml = `
            <div class="mt-4 p-3 bg-light rounded text-center border">
                <h6 class="fw-bold mb-3">Add to Bet History</h6>
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <select class="form-select w-auto" id="betChoice_${h.replace(/\s+/g, '')}_${a.replace(/\s+/g, '')}">
                        <option value="Home Win">Home Win</option>
                        <option value="Draw">Draw</option>
                        <option value="Away Win">Away Win</option>
                        <option value="Over 2.5">Over 2.5</option>
                        <option value="Under 2.5">Under 2.5</option>
                        <option value="BTTS Yes">BTTS Yes</option>
                        <option value="BTTS No">BTTS No</option>
                    </select>
                    <button class="btn btn-success fw-bold" onclick="addBetToHistory('${matchDataStr}', 'betChoice_${h.replace(/\s+/g, '')}_${a.replace(/\s+/g, '')}')">
                        <i class="bi bi-plus-circle"></i> Save Bet
                    </button>
                </div>
            </div>`;
        }

        const cardId = showExport ? 'id="exportTarget"' : '';

        return `
        ${rlHtml}
        <div ${cardId} class="card p-3 border-primary mb-3 bg-white fade-in-up">
            <h2 class="text-center mb-2">${h} vs ${a}</h2>
            <div class="text-center mb-3">${oddsBadge}</div>
            <table class="table table-bordered text-center align-middle">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th class="text-secondary">Model 1<br><small>(Final State)</small></th>
                        <th class="text-primary">Model 2<br><small>(Best Loss)</small></th>
                        <th class="text-success">Model 3<br><small>(Best Acc)</small></th>
                        <th class="bg-info text-white">Average</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>📊 Proj. xG</td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                        <td class="fw-bold">${(result.average?.projected_home_xg || 0)} - ${(result.average?.projected_away_xg || 0)}</td>
                    </tr>
                    <tr>
                        <td>🎯 Score</td>
                        <td>${getScore(m_final)}</td>
                        <td class="fw-bold">${getScore(m_loss)}</td>
                        <td>${getScore(m_acc)}</td>
                        <td class="fw-bold">${getScore(result.average)}</td>
                    </tr>
                    <tr>
                        <td>🏠 Home Win</td>
                        <td>${getVal(m_final, 'win')}</td>
                        <td class="fw-bold text-primary">${getVal(m_loss, 'win')}</td>
                        <td class="text-success">${getVal(m_acc, 'win')}</td>
                        <td class="fw-bold bg-light">${getVal(result.average, 'win')}</td>
                    </tr>
                    <tr>
                        <td>🤝 Draw</td>
                        <td>${getVal(m_final, 'draw')}</td>
                        <td class="fw-bold text-primary">${getVal(m_loss, 'draw')}</td>
                        <td class="text-success">${getVal(m_acc, 'draw')}</td>
                        <td class="fw-bold bg-light">${getVal(result.average, 'draw')}</td>
                    </tr>
                    <tr>
                        <td>✈️ Away Win</td>
                        <td>${getVal(m_final, 'loss')}</td>
                        <td class="fw-bold text-primary">${getVal(m_loss, 'loss')}</td>
                        <td class="text-success">${getVal(m_acc, 'loss')}</td>
                        <td class="fw-bold bg-light">${getVal(result.average, 'loss')}</td>
                    </tr>
                    <tr class="table-light"><td colspan="5"></td></tr>
                    <tr>
                        <td>Over 2.5</td>
                        <td>${getVal(m_final, 'over_2_5')}</td>
                        <td class="fw-bold text-primary">${getVal(m_loss, 'over_2_5')}</td>
                        <td class="text-success">${getVal(m_acc, 'over_2_5')}</td>
                        <td class="fw-bold bg-light">${getVal(result.average, 'over_2_5')}</td>
                    </tr>
                    <tr class="btts-row">
                        <td>BTTS</td>
                        <td>${getVal(m_final, 'btts_yes')}</td>
                        <td class="fw-bold text-danger">${getVal(m_loss, 'btts_yes')}</td>
                        <td class="text-success">${getVal(m_acc, 'btts_yes')}</td>
                        <td class="fw-bold bg-light">${getVal(result.average, 'btts_yes')}</td>
                    </tr>
                </tbody>
            </table>

            <div class="row mt-4">

    async function runCalibration() {
        document.getElementById('calibrationLoading').style.display = 'block';
        document.getElementById('calibrationResult').style.display = 'none';
        const term = document.getElementById('calibTerminal');
        const prog = document.getElementById('calibProgBar');
        term.innerHTML = '<span class="text-secondary">$ starting calibration...</span><br>';
        prog.style.width = '0%';
        prog.textContent = '0%';

        try {
            const response = await fetch('/get_calibration');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (let line of lines) {
                    if (!line.trim()) continue;
                    try {
                        const data = JSON.parse(line);

                        if (data.log) {
                            term.innerHTML += `> ${data.log}<br>`;
                            term.scrollTop = term.scrollHeight;
                        }

                        if (data.progress !== undefined) {
                            prog.style.width = data.progress + '%';
                            prog.textContent = data.progress + '%';
                        }

                        if (data.status === 'complete' && data.result) {
                            const div = document.getElementById('calibrationResult');
                            div.style.display = 'block';
                            div.innerHTML = `<h2 class="display-4 fw-bold text-primary">${data.result.optimal_threshold}%</h2>
                                             <p class="lead">${data.result.details}</p>`;
                        }

                        if (data.status === 'error') {
                            term.innerHTML += `<span class="text-danger">ERROR: ${data.log}</span><br>`;
                        }

                    } catch (e) { console.error("JSON Parse Error", e); }
                }
            }
        } catch (e) {
            term.innerHTML += `<span class="text-danger">FATAL ERROR: ${e}</span><br>`;
        }
    }

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            const result = await res.json();
            if (result.status === 'success') {
                loadBetHistory();
            } else {
                alert("Error removing bet: " + result.message);
            }
        } catch (e) {
            alert("Request failed: " + e);
        }
    }

    async function clearSelectedHistory() {
        const checkboxes = document.querySelectorAll('.history-cb:checked');
        if (checkboxes.length === 0) return;
        if (!confirm(`Delete ${checkboxes.length} selected bets?`)) return;

        for (let cb of checkboxes) {
            try {
                await fetch('/api/bet_history/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: cb.value })
                });
            } catch (e) {
                console.error("Failed to remove ID", cb.value);
            }
        }
        loadBetHistory();
    }

    async function addBetToHistory(matchDataStr, selectId) {
        const data = JSON.parse(decodeURIComponent(matchDataStr));
        const choice = document.getElementById(selectId).value;
        data.user_choice = choice;

        try {
            const res = await fetch('/api/bet_history/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.status === 'success') {
                alert('Bet saved to history!');
                loadBetHistory();
            } else {
                alert('Error: ' + result.message);
            }
        } catch (e) {
            alert('Request failed: ' + e);
        }
    }

    async function sendSelectedToHistory() {
        const checkboxes = document.querySelectorAll('.strategy-cb:checked');
        if (checkboxes.length === 0) {
            alert("Please select at least one match to send to bet history.");
            return;
        }

        const matchesToSave = [];
        checkboxes.forEach(cb => {
            const idx = cb.getAttribute('data-idx');
            const m = currentStrategyMatches[idx];

            matchesToSave.push({
                home: m.home,
                away: m.away,
                date: m.date,
                pred_score: `${m.pred_pick} (${m.pred_conf}%)`,
                rl_pick: `${m.rl_pick} (${m.rl_conf}%)`,
                user_choice: m.rl_pick !== 'PASS' ? m.rl_pick : m.pred_pick,
                odds_1: m.odds_1,
                odds_x: m.odds_x,
                odds_2: m.odds_2
            });
        });

        try {
            const res = await fetch('/api/bet_history/add_batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ matches: matchesToSave })
            });
            const result = await res.json();
            if (result.status === 'success') {
                alert(`Successfully sent ${matchesToSave.length} matches to Bet History.`);
                checkboxes.forEach(cb => cb.checked = false);
                await fetchBetHistoryData();
                updateFilters();
                loadBetHistory();
            } else {
                alert("Error saving: " + result.message);
            }
        } catch (e) {
            alert("Failed to save bets: " + e);
        }
    }

    // Initialize history on load
    document.addEventListener('DOMContentLoaded', () => {
        const historyTabTrigger = document.querySelector('button[data-bs-target="#history"]');
        if (historyTabTrigger) {
            historyTabTrigger.addEventListener('shown.bs.tab', function (event) {
                loadBetHistory();
            });
        }
    });

</script>

<script>
    (function () {
        const titles = {
            '#home': ['FOBO AI', 'Pipeline architecture + design rationale'],
            '#predict': ['Match Predictor', 'Select teams to run a full AI analysis'],
            '#calendar': ['Daily Schedule', 'Browse all AI-predicted matches for today'],
            '#power': ['GNN Power Rankings', 'Visualising transitive strength learned by the graph network'],
            '#stats': ['Optimal Prediction Threshold', 'Calculate the best confidence cutoff based on last 400 matches'],
            '#train': ['Optimal RL Confidence', 'Find the sweet spot for the Reinforcement Learning agent'],
            '#strategy': ['Strategy Generator', 'Filter and rank picks using your custom thresholds'],
            '#simulation': ['Strategy Lab', 'Run simulations and generate weekly profit reports'],
            '#history': ['Bet History', 'Track your picks, outcomes, and long-term P&L'],
            '#insights': ['Project History', 'Level 1 → Level 8 — how FOBO AI evolved'],
        };
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.td-nav-link').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    e.preventDefault();

                    // 1. Update button states
                    document.querySelectorAll('.td-nav-link').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    var targetId = this.getAttribute('data-bs-target');

                    // 2. Hide all panes
                    document.querySelectorAll('.tab-pane').forEach(function (pane) {
                        pane.classList.remove('show', 'active');
                    });

                    // 3. Show target pane
                    var targetPane = document.querySelector(targetId);
                    if (targetPane) {
                        targetPane.classList.add('show', 'active');
                    }

                    // 4. Update Header Titles
                    if (titles[targetId]) {
                        document.getElementById('pageTitle').textContent = titles[targetId][0];
                        document.getElementById('pageSub').textContent = titles[targetId][1];
                    }
                });
            });
        });
    })();
</script>
