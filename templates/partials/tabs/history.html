<!-- BET HISTORY TAB -->
<div class="tab-pane fade" id="history">
    <div class="card p-4 hover-elevate shadow-sm border-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-success">📜 Bet History</h3>
            <button class="btn btn-outline-danger btn-sm fw-bold" onclick="clearSelectedHistory()">
                <i class="bi bi-trash"></i> Delete Selected
            </button>
        </div>

        <div id="historyLoading" class="text-center my-4" style="display:none;">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-light">
                    <tr>
                        <th style="width: 40px;"><input class="form-check-input" type="checkbox"
                                id="historySelectAll" onclick="toggleAllHistory()"></th>
                        <th>Date Added</th>
                        <th>Match</th>
                        <th>Match Date</th>
                        <th>Odds (1, X, 2)</th>
                        <th>Prediction</th>
                        <th>User Bet</th>
                        <th>Outcome (Hit/Miss)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="7" class="text-muted">Loading history...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
