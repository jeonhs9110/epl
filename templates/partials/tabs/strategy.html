<!-- STRATEGY TAB -->
<div class="tab-pane fade" id="strategy">
    <div class="card p-4 hover-elevate">
        <h3 class="text-primary fw-bold mb-4 text-center"><i class="bi bi-lightbulb"></i> AI Betting
            Strategy Generator</h3>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control" id="stratStart">
            </div>
            <div class="col-md-3">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control" id="stratEnd">
            </div>

            <div class="col-md-6">
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label fw-bold small text-dark">Min Pred Conf: <span
                                id="lblPred" class="badge bg-primary">...</span></label>
                        <div class="d-flex align-items-center gap-1">
                            <button class="btn btn-primary btn-sm fw-bold px-2 py-0"
                                onclick="adjustThreshold('sliderPred', -1)">-</button>
                            <input type="range" class="form-range flex-grow-1" min="50" max="99"
                                step="1" id="sliderPred" oninput="updateFilters()"
                                onchange="updateFilters()">
                            <button class="btn btn-primary btn-sm fw-bold px-2 py-0"
                                onclick="adjustThreshold('sliderPred', 1)">+</button>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold small text-dark">Min RL Conf: <span
                                id="lblRL" class="badge bg-warning">...</span></label>
                        <div class="d-flex align-items-center gap-1">
                            <button class="btn btn-warning btn-sm text-dark fw-bold px-2 py-0"
                                onclick="adjustThreshold('sliderRL', -1)">-</button>
                            <input type="range" class="form-range flex-grow-1" min="50" max="99"
                                step="1" id="sliderRL" oninput="updateFilters()"
                                onchange="updateFilters()">
                            <button class="btn btn-warning btn-sm text-dark fw-bold px-2 py-0"
                                onclick="adjustThreshold('sliderRL', 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-12 text-center mt-3">
                <small class="text-muted d-block mb-2">Default values loaded from "Optimal Prediction" &
                    "Optimal RL" analysis.</small>
                <button class="btn btn-primary btn-lg px-5 fw-bold shadow" onclick="getStrategy()">🚀
                    Generate</button>
            </div>
        </div>
        <div class="col-12 text-center mt-2">
            <small class="text-muted">Use sliders to adjust risk level. Default (Green) = AI Optimized for
                current market.</small>
        </div>
    </div>

    <!-- LOADING -->
    <div id="stratLoading" style="display:none;" class="text-center my-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="stratResults" style="display:none;">
        <div class="text-end mb-3">
            <button class="btn btn-success fw-bold shadow-sm" onclick="sendSelectedToHistory()">
                <i class="bi bi-journal-plus"></i> Add Selected to Bet History
            </button>
        </div>

        <!-- Bankers -->
        <div class="card border-success mb-4 shadow-sm">
            <div class="card-header bg-success text-white fw-bold">💰 BANKERS (High Confidence + RL
                Approved)</div>
            <div class="card-body">
                <ul class="list-group" id="listBankers"></ul>
            </div>
        </div>

        <!-- RL Picks -->
        <div class="card border-warning mb-4 shadow-sm">
            <div class="card-header bg-warning text-dark fw-bold">
                🤖 RL AGENT PICKS <span id="rlThreshDisplay" class="badge bg-dark ms-2 opacity-75"></span>
            </div>
            <div class="card-body">
                <ul class="list-group" id="listRL"></ul>
            </div>
        </div>

        <!-- Best Prediction Picks -->
        <div class="card border-info mb-4 shadow-sm">
            <div class="card-header bg-info text-white fw-bold">
                📈 BEST PREDICTION PICKS <span id="predThreshDisplay"
                    class="badge bg-light ms-2 opacity-75"></span>
            </div>
            <div class="card-body">
                <ul class="list-group" id="listAcca"></ul>
            </div>
        </div>
    </div>
</div>
