<!-- DAILY CALENDAR TAB -->
<div class="tab-pane fade" id="calendar">
    <div class="card p-4 hover-elevate">
        <div class="row g-2 justify-content-center align-items-center mb-4">
            <div class="col-auto">
                <label class="small fw-bold text-muted">Date</label>
                <input type="date" id="calDate" class="form-control" onchange="getDailyMatches()">
            </div>
            <div class="col-auto align-self-end">
                <button class="btn btn-outline-info fw-bold" onclick="scrapeUpcoming()">📥 Scrape Fresh
                    Data</button>
            </div>
        </div>

        <div id="calLoading" class="text-center" style="display:none;">
            <div class="spinner-border text-primary"></div>
            <p>Forecasting entire schedule...</p>
        </div>

        <div class="table-responsive" id="dailyScheduleContainer">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>League</th>
                        <th>Matchup</th>
                        <th>Home Form</th>
                        <th>Away Form</th>
                        <th class="bg-light text-primary">AVG Home%</th>
                        <th class="bg-light text-secondary">AVG Draw%</th>
                        <th class="bg-light text-danger">AVG Away%</th>
                        <th>AVG O2.5%</th>
                        <th>AVG BTTS%</th>
                        <th>Proj. xG</th>
                        <th>Pred Score</th>
                    </tr>
                </thead>
                <tbody id="calBody"></tbody>
            </table>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-4" id="dailyExportBtns" style="display:none;">
            <button class="btn btn-outline-secondary" onclick="copyDailyHTML()">📋 Copy Schedule HTML</button>
            <button class="btn btn-outline-success" onclick="downloadDailyImage()">📸 Download Schedule
                Image</button>
        </div>
    </div>
</div>
